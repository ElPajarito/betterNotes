name: Build & Deploy (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token, scoped for Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deploy; let a running one finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0            # git-revision-date plugins need full history

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build site (strict)
        run: mkdocs build --strict     # fail the build on broken links / warnings

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
